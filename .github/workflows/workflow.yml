name: deploy-foundry
concurrency: deploy-foundry

on:
  push:
    branches:
      - main
    paths:
      - 'bicep/deploy/**'
      - 'bicep/modules/**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true ## Actions will be forced to run with Node.js 24 by default starting June 2nd, 2026. Node.js 20 will be removed from the runner on September 16th, 2026

jobs:
  what-if:
    name: Bicep What-If
    runs-on: ubuntu-latest
    environment:
      name: what-if
    steps:
    - uses: actions/checkout@v4
    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Run What-If
      uses: azure/arm-deploy@v2
      with:
        scope: subscription
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        region: ${{ env.AZURE_LOCATION }}
        template: ./bicep/deploy/foundry.bicep
        parameters: ./bicep/deploy/foundry.parameters.bicepparam
        additionalArguments: --what-if

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: what-if
    environment:
      name: prod ## approval gate to review what-if results before deploying
    steps:
    - uses: actions/checkout@v4
    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - uses: azure/arm-deploy@v2
      with:
        scope: subscription
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        region: ${{ env.AZURE_LOCATION }}
        deploymentName: ${{ github.run_number }}
        template: ./bicep/deploy/foundry.bicep
        parameters: ./bicep/deploy/foundry.parameters.bicepparam